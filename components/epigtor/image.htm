{% if __SELF__.isEditor %}
<div
    id="epigtor-image-{{ __SELF__.uploadId }}"
    data-control="epigtor-image"
    data-type="image"
    data-handler="{{ __SELF__ }}::onGetUploadedImage"
    data-handler-cancel="{{ __SELF__ }}::onCancelUploadedImage"
    data-handler-delete="{{ __SELF__ }}::onDeleteImage"
    data-handler-title="{{ __SELF__ }}::onSaveImageTitle"
    data-image-partial="{{ __SELF__.imagePartial }}"
    data-refresh-code="{{ __SELF__.refreshCode }}"
    data-message="{{ __SELF__.message }}"
    data-model-class="{{ __SELF__.model_class }}"
    data-model-id="{{ __SELF__.model_id }}"
    data-image-id="{{ __SELF__.content.id }}"
    data-label-create="{{ __SELF__.labelCreate }}"
    data-label-delete="{{ __SELF__.labelDelete }}"
    data-label-delete-confirm="{{ __SELF__.labelDeleteConfirm }}"
    data-label-save="{{ __SELF__.labelSave }}"
    data-label-cancel="{{ __SELF__.labelCancel }}"
    data-label-upload="{{ __SELF__.labelUpload }}"
    data-label-replace="{{ __SELF__.labelReplace }}"
    data-label-image-title="{{ __SELF__.labelImageTitle }}"
    data-image-content = "{{ __SELF__.content }}"
    data-show-delete="{{ __SELF__.showDelete ? 'true' : 'false' }}"
    data-element-id="{{ __SELF__.uploadId }}"
    data-upload-handler="{{ __SELF__ }}::onUploadImage"
    >
    {% if __SELF__.content %}
    <span id="epigtor-{{ __SELF__.uploadId }}">
        {% partial __SELF__.imagePartial image=__SELF__.content %}
    </span>
    {% else %}
    <span id="epigtor-{{ __SELF__.uploadId }}">
        {% partial __SELF__.imageEmptyPartial labelCreate=__SELF__.labelCreate %}
    </span>
    {% endif %}
</div>
{% else %}
    {% partial __SELF__.imagePartial image=__SELF__.content %}
{% endif %}
