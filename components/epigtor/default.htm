{% if __SELF__.type == 'image' %}
    {% partial __SELF__~'::image' %}
{% elseif __SELF__.type == 'link' %}
    {% partial __SELF__~'::link' %}
{% elseif __SELF__.type == 'richeditor' %}
    {% partial __SELF__~'::richeditor' %}
{% else %}
<span
    data-control="epigtor"
    data-type="plain"
    data-handler="{{ __SELF__ }}::onSave"
    data-message="{{ __SELF__.message }}"
    data-model="{{ __SELF__.model_class }}"
    data-id="{{ __SELF__.model_id }}">
    {{ __SELF__.content|raw }}
</span>
{% endif %}
